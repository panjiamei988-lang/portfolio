<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case</title>
<link rel="stylesheet" href="assets/styles.css">
</head>

<body>

<div class="container" style="padding:80px 0">

<h1 id="title"></h1>
<p id="desc" style="color:rgba(255,255,255,.6)"></p>
<img id="img" style="width:100%;border-radius:20px;margin-top:20px">

</div>

<script>
const data = {
  eye:{
    title:"Eye Massager",
    desc:"Relaxation System",
    img:"https://panjiamei988-lang.github.io/portfolio-images/images/images-074.png"
  },
  tesla:{
    title:"Tesla Camera",
    desc:"Instant Imaging System",
    img:"https://panjiamei988-lang.github.io/portfolio-images/images/images-018.png"
  },
  nebulizer:{
    title:"Child Nebulizer",
    desc:"Medical Interaction Device",
    img:"https://panjiamei988-lang.github.io/portfolio-images/images/images-098.png"
  },
  rescue:{
    title:"Rescue Vest",
    desc:"High-altitude Oxygen System",
    img:"https://panjiamei988-lang.github.io/portfolio-images/images/images-166.png"
  },
  ice:{
    title:"Rooftop tent",
    desc:"A New Camping Experience",
    img:"https://panjiamei988-lang.github.io/portfolio-images/images/images-196.png"
  },
  exo:{
    title:"Exoskeleton",
    desc:"Wearable Assistance System",
    img:"https://panjiamei988-lang.github.io/portfolio-images/images/images-280.png"
  }
};

const id=new URLSearchParams(location.search).get("id");
const p=data[id];

document.getElementById("title").innerText=p.title;
document.getElementById("desc").innerText=p.desc;
document.getElementById("img").src=p.img;
</script>

</body>
</html>
